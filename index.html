<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kleos Group Logo Intro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --text: #fff;
      --muted: rgba(255,255,255,0.55);
      --muted-2: rgba(255,255,255,0.32);
      --line: rgba(255,255,255,0.12);
      --panel: rgba(255,255,255,0.05);
      --panel-2: rgba(255,255,255,0.07);
      --accent: rgba(90,170,255,0.55);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(70,120,220,0.10) 0%, rgba(0,0,0,0) 28%),
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0));
      cursor: pointer;
      user-select: none;
    }

    #grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 62px 62px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      -webkit-mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      pointer-events: none;
    }

    #glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 460px;
      height: 460px;
      transform: translate(-50%, -50%) scale(0.7);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110,170,255,0.18) 0%, rgba(110,170,255,0.06) 28%, transparent 70%);
      opacity: 0;
      transition: opacity 0.9s ease, transform 1s ease;
      pointer-events: none;
      filter: blur(8px);
    }

    #glow.on {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #connectors {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #connectors.on { opacity: 1; }

    .brand-card {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translate3d(0, 16px, 0) scale(0.62);
      transition: transform 0.65s cubic-bezier(.2,.8,.2,1), opacity 0.65s ease;
      will-change: transform, opacity;
    }

    .brand-card.show {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
    }

    .brand-card.fly {
      opacity: 0 !important;
      transform: translate(var(--tx), var(--ty)) scale(0.08) !important;
      transition: transform 0.82s cubic-bezier(.7,0,.2,1), opacity 0.65s ease !important;
    }

    .logo-box {
      width: 124px;
      height: 124px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .logo-box img {
      width: 118px;
      height: 118px;
      object-fit: contain;
      display: block;
    }

    .brand-name {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.3px;
      text-transform: uppercase;
      white-space: nowrap;
      text-align: center;
    }

    #card-1 { left: 7%; top: 11%; --tx: 320%; --ty: 220%; }
    #card-2 { right: 7%; top: 11%; --tx: -320%; --ty: 220%; }
    #card-3 { left: 7%; bottom: 11%; --tx: 320%; --ty: -220%; }
    #card-4 { right: 7%; bottom: 11%; --tx: -320%; --ty: -220%; }

    #burst {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0;
      height: 0;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(170,210,255,0.65) 32%, rgba(170,210,255,0.0) 68%);
      opacity: 0;
      pointer-events: none;
      filter: blur(1px);
    }

    #kleos-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    #kleos-main {
      display: flex;
      align-items: center;
      gap: 28px;
      opacity: 0;
      transform: translateY(18px) scale(1.18);
      transition: opacity 0.9s ease, transform 0.9s cubic-bezier(.2,.8,.2,1);
    }

    #kleos-main.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    #kleos-logo-wrap {
      width: 138px;
      height: 138px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    #kleos-logo-wrap img {
      width: 128px;
      height: 128px;
      object-fit: contain;
      display: block;
    }

    #kleos-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    #kleos-name {
      color: var(--text);
      font-size: clamp(44px, 7.2vw, 92px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 10px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #kleos-sub {
      margin-top: 8px;
      color: rgba(255,255,255,0.38);
      font-size: clamp(13px, 2vw, 20px);
      letter-spacing: 8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #kleos-rule {
      width: 0;
      height: 1px;
      margin: 24px auto 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.32), transparent);
      transition: width 1s ease;
    }

    #kleos-rule.expand { width: min(420px, 62vw); }

    #kleos-tagline {
      margin-top: 18px;
      color: rgba(255,255,255,0.5);
      font-size: clamp(13px, 2vw, 18px);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #kleos-tagline.show {
      opacity: 1;
      transform: translateY(0);
    }

    #kleos-tagline strong {
      color: rgba(255,255,255,0.88);
      font-weight: 500;
    }

    #subbrands-row {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }

    #subbrands-row.show {
      opacity: 1;
      transform: translateY(0);
    }

    .subbrand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .subbrand-dot {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .subbrand-dot img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      display: block;
    }

    .subbrand-label {
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.18);
      font-size: 11px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #replay {
      position: absolute;
      right: 18px;
      bottom: 16px;
      color: rgba(255,255,255,0.24);
      font-size: 11px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 10;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    #replay:hover {
      color: rgba(255,255,255,0.65);
      transform: translateY(-1px);
    }

    @media (max-width: 1100px) {
      .logo-box {
        width: 102px;
        height: 102px;
      }

      .logo-box img {
        width: 98px;
        height: 98px;
      }

      .brand-name {
        font-size: 11px;
        letter-spacing: 1.9px;
      }

      #kleos-logo-wrap {
        width: 112px;
        height: 112px;
      }

      #kleos-logo-wrap img {
        width: 104px;
        height: 104px;
      }

      #kleos-main {
        gap: 22px;
      }
    }

    @media (max-width: 760px) {
      #card-1, #card-2, #card-3, #card-4 {
        left: auto;
        right: auto;
      }

      #card-1 { left: 6%; top: 8%; }
      #card-2 { right: 6%; top: 8%; }
      #card-3 { left: 6%; bottom: 16%; }
      #card-4 { right: 6%; bottom: 16%; }

      .logo-box {
        width: 82px;
        height: 82px;
      }

      .logo-box img {
        width: 80px;
        height: 80px;
      }

      .brand-name {
        font-size: 10px;
        letter-spacing: 1.4px;
        max-width: 130px;
        white-space: normal;
      }

      #kleos-main {
        flex-direction: column;
        gap: 18px;
      }

      #kleos-copy {
        align-items: center;
      }

      #kleos-name {
        letter-spacing: 6px;
        text-align: center;
      }

      #kleos-sub {
        letter-spacing: 5px;
        text-align: center;
      }

      #subbrands-row {
        gap: 18px;
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="grid"></div>
    <div id="glow"></div>

    <svg id="connectors" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="line-1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#72b2ff" stop-opacity="0.65"></stop>
          <stop offset="100%" stop-color="#72b2ff" stop-opacity="0"></stop>
        </linearGradient>
        <linearGradient id="line-2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#72b2ff" stop-opacity="0.65"></stop>
          <stop offset="100%" stop-color="#72b2ff" stop-opacity="0"></stop>
        </linearGradient>
        <linearGradient id="line-3" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#72b2ff" stop-opacity="0.65"></stop>
          <stop offset="100%" stop-color="#72b2ff" stop-opacity="0"></stop>
        </linearGradient>
        <linearGradient id="line-4" x1="100%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#72b2ff" stop-opacity="0.65"></stop>
          <stop offset="100%" stop-color="#72b2ff" stop-opacity="0"></stop>
        </linearGradient>
      </defs>

      <line x1="16" y1="25" x2="50" y2="50" stroke="url(#line-1)" stroke-width="0.22" stroke-dasharray="1.2 0.7"></line>
      <line x1="84" y1="25" x2="50" y2="50" stroke="url(#line-2)" stroke-width="0.22" stroke-dasharray="1.2 0.7"></line>
      <line x1="16" y1="75" x2="50" y2="50" stroke="url(#line-3)" stroke-width="0.22" stroke-dasharray="1.2 0.7"></line>
      <line x1="84" y1="75" x2="50" y2="50" stroke="url(#line-4)" stroke-width="0.22" stroke-dasharray="1.2 0.7"></line>
    </svg>

    <div class="brand-card" id="card-1">
      <div class="logo-box"><img src="./assets/FV-Capitol.jpg" alt="Future View Capital"></div>
      <div class="brand-name">Future View Capital</div>
    </div>

    <div class="brand-card" id="card-2">
      <div class="logo-box"><img src="./assets/RoutingTech.png" alt="RoutingTech"></div>
      <div class="brand-name">RoutingTech</div>
    </div>

    <div class="brand-card" id="card-3">
      <div class="logo-box"><img src="./assets/FutureViewPOS.png" alt="FV Payment Solutions"></div>
      <div class="brand-name">FV Payment Solutions</div>
    </div>

    <div class="brand-card" id="card-4">
      <div class="logo-box"><img src="./assets/Skypay.png" alt="SkyPay"></div>
      <div class="brand-name">SkyPay</div>
    </div>

    <div id="burst"></div>

    <section id="kleos-screen" aria-label="Kleos Group reveal">
      <div id="kleos-main">
        <div id="kleos-logo-wrap">
          <img src="./assets/Kleos-Group.png" alt="Kleos Group">
        </div>
        <div id="kleos-copy">
          <div id="kleos-name">KLEOS</div>
          <div id="kleos-sub">Group</div>
        </div>
      </div>

      <div id="kleos-rule"></div>
      <div id="kleos-tagline">One Company · <strong>Many Solutions</strong></div>

      <div id="subbrands-row">
        <div class="subbrand">
          <div class="subbrand-dot"><img src="./assets/FV-Capitol.jpg" alt="Future View Capital"></div>
          <div class="subbrand-label">FV Capital</div>
        </div>
        <div class="subbrand">
          <div class="subbrand-dot"><img src="./assets/RoutingTech.png" alt="RoutingTech"></div>
          <div class="subbrand-label">RoutingTech</div>
        </div>
        <div class="subbrand">
          <div class="subbrand-dot"><img src="./assets/FutureViewPOS.png" alt="FV Payment Solutions"></div>
          <div class="subbrand-label">FV POS</div>
        </div>
        <div class="subbrand">
          <div class="subbrand-dot"><img src="./assets/Skypay.png" alt="SkyPay"></div>
          <div class="subbrand-label">SkyPay</div>
        </div>
      </div>
    </section>

    <div id="hint">Click anywhere to play</div>
    <div id="replay">↺ Replay</div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const glow = document.getElementById('glow');
    const connectors = document.getElementById('connectors');
    const burst = document.getElementById('burst');
    const hint = document.getElementById('hint');
    const replayBtn = document.getElementById('replay');

    const cards = [
      document.getElementById('card-1'),
      document.getElementById('card-2'),
      document.getElementById('card-3'),
      document.getElementById('card-4')
    ];

    const kleosScreen = document.getElementById('kleos-screen');
    const kleosMain = document.getElementById('kleos-main');
    const kleosRule = document.getElementById('kleos-rule');
    const kleosTagline = document.getElementById('kleos-tagline');
    const subbrandsRow = document.getElementById('subbrands-row');

    let timers = [];
    let isPlaying = false;

    function clearTimers() {
      timers.forEach(clearTimeout);
      timers = [];
    }

    function resetScene() {
      clearTimers();
      isPlaying = false;

      glow.classList.remove('on');
      connectors.classList.remove('on');
      hint.style.opacity = '1';

      burst.style.transition = 'none';
      burst.style.opacity = '0';
      burst.style.width = '0px';
      burst.style.height = '0px';

      cards.forEach(card => {
        card.classList.remove('show', 'fly');
      });

      kleosScreen.style.opacity = '0';
      kleosMain.classList.remove('show');
      kleosRule.classList.remove('expand');
      kleosTagline.classList.remove('show');
      subbrandsRow.classList.remove('show');
    }

    function later(fn, delay) {
      const t = setTimeout(fn, delay);
      timers.push(t);
    }

    function playIntro() {
      if (isPlaying) return;
      isPlaying = true;
      hint.style.opacity = '0';
      resetForPlay();

      later(() => glow.classList.add('on'), 120);
      later(() => connectors.classList.add('on'), 340);

      cards.forEach((card, index) => {
        later(() => card.classList.add('show'), 320 + index * 180);
      });

      later(() => {
        cards.forEach(card => card.classList.add('fly'));
      }, 1750);

      later(() => runBurst(), 2300);
      later(() => revealKleos(), 2550);
      later(() => { isPlaying = false; }, 4200);
    }

    function resetForPlay() {
      clearTimers();
      glow.classList.remove('on');
      connectors.classList.remove('on');

      burst.style.transition = 'none';
      burst.style.opacity = '0';
      burst.style.width = '0px';
      burst.style.height = '0px';

      cards.forEach(card => {
        card.classList.remove('show', 'fly');
      });

      kleosScreen.style.opacity = '0';
      kleosMain.classList.remove('show');
      kleosRule.classList.remove('expand');
      kleosTagline.classList.remove('show');
      subbrandsRow.classList.remove('show');
    }

    function runBurst() {
      burst.style.transition = 'none';
      burst.style.opacity = '1';
      burst.style.width = '10px';
      burst.style.height = '10px';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          burst.style.transition = 'width 0.55s ease, height 0.55s ease, opacity 0.75s ease';
          burst.style.width = '520px';
          burst.style.height = '520px';
          burst.style.opacity = '0';
        });
      });
    }

    function revealKleos() {
      kleosScreen.style.opacity = '1';
      kleosMain.classList.add('show');
      later(() => kleosRule.classList.add('expand'), 120);
      later(() => kleosTagline.classList.add('show'), 300);
      later(() => subbrandsRow.classList.add('show'), 520);
    }

    stage.addEventListener('click', playIntro);
    replayBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      resetScene();
      playIntro();
    });

    window.addEventListener('load', () => {
      resetScene();
      later(playIntro, 220);
    });
  </script>
</body>
</html>


<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #stage {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
    position: relative;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
  }

  /* Subtle grid */
  #grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Radial center glow */
  #glow {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,160,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
  }
  #glow.on { opacity: 1; }

  /* ─── BRAND CARDS ─── */
  .bcard {
    position: absolute;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0;
    transform: scale(0.55);
    transition: opacity 0.55s ease, transform 0.55s ease;
    will-change: transform, opacity;
  }
  .bcard.show { opacity: 1; transform: scale(1); }
  .bcard.fly {
    transition: opacity 0.6s ease, transform 0.6s ease !important;
    opacity: 0 !important;
    transform: translate(var(--tx), var(--ty)) scale(0.05) !important;
  }

  .logo-box {
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    overflow: visible;
  }
  .logo-box img {
    width: 70px; height: 70px;
    object-fit: contain;
  }

  .bcard-name {
    font-family: Arial, sans-serif;
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
  }

  /* connector lines SVG */
  #connectors {
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s;
  }
  #connectors.on { opacity: 1; }

  /* burst flash */
  #burst {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, rgba(200,220,255,0.6) 35%, transparent 65%);
    width: 0; height: 0;
    opacity: 0;
    pointer-events: none;
    transition: none;
  }

  /* ─── KLEOS REVEAL ─── */
  #kleos {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
    opacity: 0;
    pointer-events: none;
  }

  #kleos-inner {
    display: flex; align-items: center; gap: 18px;
    opacity: 0;
    transform: scale(1.35);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  #kleos-inner.show { opacity: 1; transform: scale(1); }

  #kleos-logo {
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    overflow: visible;
  }
  #kleos-logo img {
    width: 68px; height: 68px;
    object-fit: contain;
    filter: invert(1);
  }

  #kleos-text { display: flex; flex-direction: column; }
  #kleos-name {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900; color: #fff;
    letter-spacing: 7px; line-height: 1;
    text-transform: uppercase;
  }
  #kleos-sub {
    font-family: Arial, sans-serif;
    font-size: clamp(9px, 1.6vw, 13px);
    font-weight: 400; color: rgba(255,255,255,0.35);
    letter-spacing: 5px; text-transform: uppercase;
    margin-top: 4px;
  }

  #kleos-rule {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    margin: 14px auto;
    transition: width 1.1s ease 0.2s;
  }
  #kleos-rule.expand { width: 240px; }

  #kleos-tagline {
    font-family: Arial, sans-serif;
    font-size: clamp(10px, 1.8vw, 14px);
    color: rgba(255,255,255,0.45);
    letter-spacing: 3px; text-transform: uppercase;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s;
    text-align: center;
  }
  #kleos-tagline.show { opacity: 1; transform: translateY(0); }
  #kleos-tagline strong { color: rgba(255,255,255,0.8); font-weight: 400; }

  /* sub brand icons row */
  #sub-row {
    display: flex; gap: 20px; margin-top: 20px;
    opacity: 0; transition: opacity 0.8s ease 0.9s;
    align-items: center;
  }
  #sub-row.show { opacity: 1; }
  .sub-chip {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .sub-dot { width: 28px; height: 28px; overflow: visible; display: flex; align-items: center; justify-content: center; }
  .sub-dot img { width: 26px; height: 26px; object-fit: contain; }
  .sub-lbl { font-family: Arial, sans-serif; font-size: 8px; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.25); }

  /* replay */
  #replay {
    position: absolute; bottom: 12px; right: 14px;
    font-size: 10px; color: rgba(255,255,255,0.2);
    cursor: pointer; font-family: Arial, sans-serif;
    letter-spacing: 1px; text-transform: uppercase;
    transition: color 0.2s; z-index: 30;
  }
  #replay:hover { color: rgba(255,255,255,0.5); }
</style>
